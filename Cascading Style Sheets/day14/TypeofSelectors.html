<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of Selectors</title>
    <style>
        /* Element Selector */
        h1{
            color: brown;
        }
        /* Class Selector */
        .class{
            color: chartreuse;
        }
        /* id selector */
        #id{
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <h1>Hello</h1>
    <h1 class="class">Hey</h1>
    <h2 id="id">Heyaaa</h2>
</body>
</html>
